name: Validar Pipeline (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, feature/* ]

jobs:
  test-scraping:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Instalar Dependencias (Scraping)
      working-directory: ./packages/scraping-indexing
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Pruebas Automatizadas (Scraping)
      working-directory: ./packages/scraping-indexing
      run: |
        python -m pytest pruebas/

  test-agent:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependencias (Agent)
      working-directory: ./apps/agent
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Se comenta la ejecución de tests si no hemos escrito tests todavía para el agente,
    # pero preparamos el mapeo del secreto desde GitHub
    - name: Ejecutar Pruebas Automatizadas (Agent)
      working-directory: ./apps/agent
      env:
        GEMINI_API_KEY: "test-ci-key-placeholder"
        API_KEY: "test-ci-key"
        DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      run: |
        python -m pytest tests/

  test-mcp:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependencias (MCP)
      working-directory: ./apps/mcp-server
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Pruebas Automatizadas (MCP)
      working-directory: ./apps/mcp-server
      run: |
        python -m pytest tests/

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './apps/frontend/package-lock.json'

    - name: Instalar Dependencias (Frontend)
      working-directory: ./apps/frontend
      run: npm install

    - name: Validar Construcción (Frontend)
      working-directory: ./apps/frontend
      run: npm run build
