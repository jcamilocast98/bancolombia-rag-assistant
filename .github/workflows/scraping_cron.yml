name: Ejecutar Scraping & Indexación

on:
  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  # Ejemplo de cron: Ejecutar todos los domingos a la media noche (UTC)
  schedule:
    - cron: '0 0 * * 0'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: ankane/pgvector:v0.5.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: bancolombia_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Instalar Dependencias
      working-directory: ./packages/scraping-indexing
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Extracción (Scraping)
      working-directory: ./packages/scraping-indexing
      env:
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        PAGINAS_MAXIMAS: "10"
      run: |
        python -m src.scraping.main

    - name: Ejecutar Indexación
      working-directory: ./packages/scraping-indexing
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres_password
        POSTGRES_DB: bancolombia_rag
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python -m src.indexacion.main
