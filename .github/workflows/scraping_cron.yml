name: Ejecutar Scraping & Indexación

on:
  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  # Ejemplo de cron: Ejecutar todos los domingos a la media noche (UTC)
  schedule:
    - cron: '0 0 * * 0'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: ankane/pgvector:v0.5.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: bancolombia_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Iniciar MinIO (Manual)
      run: |
        docker run -d -p 9000:9000 --name minio \
          -e "MINIO_ROOT_USER=minioadmin" \
          -e "MINIO_ROOT_PASSWORD=minioadmin" \
          minio/minio server /data
        
        # Esperar a que el servicio esté listo
        timeout 30s bash -c 'until curl -f http://localhost:9000/minio/health/live; do sleep 2; done'

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Instalar Dependencias
      working-directory: ./packages/scraping-indexing
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Extracción (Scraping)
      working-directory: ./packages/scraping-indexing
      env:
        URL_REDIS: redis://localhost:6379/0
        ENDPOINT_S3: localhost:9000
        CLAVE_ACCESO_S3: minioadmin
        CLAVE_SECRETA_S3: minioadmin
        BUCKET_S3: bancolombia-raw-html
        PAGINAS_MAXIMAS: "5"
      run: |
        python -m src.scraping.main

    - name: Inicializar Base de Datos (Tablas & Extensiones)
      working-directory: ./packages/scraping-indexing
      env:
        URL_BASE_DATOS: postgresql+asyncpg://postgres:postgres_password@localhost:5432/bancolombia_rag
      run: |
        python -m src.init_db

    - name: Ejecutar Indexación
      working-directory: ./packages/scraping-indexing
      env:
        URL_BASE_DATOS: postgresql+asyncpg://postgres:postgres_password@localhost:5432/bancolombia_rag
        ENDPOINT_S3: localhost:9000
        CLAVE_ACCESO_S3: minioadmin
        CLAVE_SECRETA_S3: minioadmin
        BUCKET_S3: bancolombia-raw-html
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python -m src.indexacion.main
