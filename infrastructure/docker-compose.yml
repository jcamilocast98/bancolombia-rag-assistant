version: "3.9"

services:
  # ============================================
  # 🗄️ PostgreSQL + pgvector (Adaptador de Persistencia)
  # Capa: Infraestructura — Base de Datos Vectorial
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bancolombia_rag}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-bancolombia_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # ============================================
  # 📨 Redis (Adaptador de Cola de Mensajes)
  # Capa: Infraestructura — Puerto de Cola
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # ============================================
  # 📦 MinIO (Adaptador de Almacenamiento S3)
  # Capa: Infraestructura — Puerto de Almacenamiento
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # ============================================
  # 🔭 Jaeger (Observabilidad y Trazabilidad)
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rag-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - rag-network

  # ============================================
  # 🤖 Agent (Orquestador LLM + Cliente MCP)
  # Capa: Interfaces → Aplicación → Dominio
  # Puertos: LLMPort, MCPClientPort, MemoryPort
  # ============================================
  agent:
    build:
      context: ../apps/agent
      dockerfile: Dockerfile
    container_name: rag-agent
    restart: unless-stopped
    ports:
      - "${AGENT_API_PORT:-8000}:8000"
    environment:
      # ── Puertos del Dominio (inyectados como adaptadores) ──
      # Adaptador LLM: GeminiLLMAdapter
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_CHAT_MODEL=${GEMINI_CHAT_MODEL:-gemini-2.0-flash-exp}
      # Adaptador MCP: MCPClientAdapter (transporte SSE hacia el servidor MCP)
      - MCP_TRANSPORT=sse
      - MCP_SSE_URL=${MCP_SSE_URL:-http://mcp-server:8001/mcp/sse}
      # Adaptador de Memoria: PostgresMemoryAdapter (historial conversacional)
      # Usa SQLite local en el contenedor para persistencia ligera del historial
      - DATABASE_URL=sqlite+aiosqlite:///./agent.db
      # ── Seguridad (API Key para el endpoint REST) ──
      # ── Seguridad (API Key para el endpoint REST) ──
      - API_KEY=${AGENT_API_KEY:-mi-api-key-segura-123}
      # ── Observabilidad ──
      - LOG_LEVEL=${AGENT_LOG_LEVEL:-INFO}
      - PYTHONIOENCODING=utf-8
      - PORT=8000
      - OTEL_SERVICE_NAME=rag-agent
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_LOGS_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rag-network

  # ============================================
  # 🔧 MCP Server (Servidor MCP RAG)
  # Capa: Interfaces (MCP Protocol) → Aplicación → Dominio
  # Puertos: VectorDBPort, EmbeddingPort
  # ============================================
  mcp-server:
    build:
      context: ../apps/mcp-server
      dockerfile: Dockerfile
    container_name: rag-mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_SERVER_PORT:-8001}:8001"
    environment:
      # ── Puertos del Dominio (inyectados como adaptadores) ──
      # Adaptador de Embeddings: GeminiEmbeddingAdapter
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-001}
      # Adaptador de BD Vectorial: PgVectorAdapter (asyncpg directo)
      - DATABASE_URL=postgresql://raguser:changeme@postgres:5432/bancolombia_rag
      # ── Configuración del transporte MCP ──
      - MCP_TRANSPORT=sse
      # ── Observabilidad ──
      - LOG_LEVEL=${MCP_LOG_LEVEL:-INFO}
      - PYTHONIOENCODING=utf-8
      - OTEL_SERVICE_NAME=rag-mcp-server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_LOGS_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - rag-network

  # ============================================
  # 🕷️ Scraping & Indexing (Job / Worker)
  # Capa: Pipeline → Dominio (Scraping + Indexación)
  # Puertos: PuertoCola, PuertoAlmacenamiento, PuertoBdVectorial, PuertoEmbeddings
  # ============================================
  scraping-indexing:
    build:
      context: ../packages/scraping-indexing
      dockerfile: Dockerfile
    container_name: rag-scraping
    restart: "no"
    command: ["opentelemetry-instrument", "python", "-m", "src.pipeline"]
    environment:
      # ── Puertos del Dominio (nombres alineados con ajustes.py / pydantic-settings) ──
      # Adaptador de Embeddings: AdaptadorEmbeddingsGemini
      - PROVEEDOR_EMBEDDINGS=gemini
      - CLAVE_API_GEMINI=${GEMINI_API_KEY}
      - MODELO_EMBEDDING_GEMINI=${MODELO_EMBEDDING_GEMINI:-embedding-001}
      # Adaptador de Cola: AdaptadorColaRedis
      - URL_REDIS=redis://redis:6379/0
      # Adaptador de Almacenamiento: AdaptadorAlmacenamientoS3
      - ENDPOINT_S3=minio:9000
      - CLAVE_ACCESO_S3=${S3_ACCESS_KEY:-minioadmin}
      - CLAVE_SECRETA_S3=${S3_SECRET_KEY:-minioadmin}
      - BUCKET_S3=${BUCKET_S3:-bancolombia-raw-html}
      # Adaptador de BD Vectorial: AdaptadorPgVector
      - URL_BASE_DATOS=postgresql+asyncpg://raguser:changeme@postgres:5432/bancolombia_rag
      # ── Configuración de Scraping (Dominio) ──
      - URL_BASE=${SCRAPING_BASE_URL:-https://www.bancolombia.com/personas}
      - PAGINAS_MAXIMAS=${SCRAPING_MAX_PAGES:-50}
      - RETRASO_RASTREO=${SCRAPING_DELAY_SECONDS:-2}
      # ── Configuración de Chunks (Dominio) ──
      - TAMANO_CHUNK=${CHUNK_SIZE:-512}
      - SOLAPAMIENTO_CHUNK=${CHUNK_OVERLAP:-64}
      # ── Observabilidad ──
      - LOG_LEVEL=INFO
      - PYTHONIOENCODING=utf-8
      - OTEL_SERVICE_NAME=rag-scraping
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_LOGS_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - rag-network

  # ============================================
  # 🗂️ pgAdmin (Herramienta de Administración — solo desarrollo)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rag-pgadmin
    restart: unless-stopped
    profiles:
      - dev-tools
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bancolombia-rag.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rag-network

  # ============================================
  # 🌐 Frontend (Interfaz de Usuario)
  # ============================================
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    environment:
      - API_URL=${FRONTEND_API_URL:-http://localhost:8000}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      agent:
        condition: service_healthy
    networks:
      - rag-network

# ============================================
# Volumes (Capa de Infraestructura Persistente)
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ============================================
# Networks (Red interna del sistema)
# ============================================
networks:
  rag-network:
    driver: bridge
    name: bancolombia-rag-network
